<!DOCTYPE html>
<html>
<head>
    <title>Silsilah Keluarga</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <iframe id="gasFrame" src=""></iframe>

    <script>
        // 1. Link asli Google Apps Script Anda (Ganti dengan link Deploy Anda yang berakhiran /exec)
        var gasLink = "https://script.google.com/macros/s/AKfycbzfz6u-fzJaCGmcbUi1xksFMKCmXWkVXqAwBenu7tQ8TOe8SHsY2ITmbXSw9OtIrYUOTA/exec";

        // 2. Tangkap parameter dari URL GitHub (misal: ?uid=123)
        var urlParams = new URLSearchParams(window.location.search);
        var uid = urlParams.get('uid');

        // 3. Gabungkan link Google dengan UID jika ada, lalu masukkan ke iframe
        if (uid) {
            document.getElementById('gasFrame').src = gasLink + "?uid=" + uid;
        } else {
            document.getElementById('gasFrame').src = gasLink;
        }
    </script>

</body>
</html>
