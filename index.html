<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Silsilah Keluarga</title>
    <style>
        body, html { margin:0; padding:0; height:100%; overflow:hidden; background:#f8fafc; }
        iframe { width:100%; height:100%; border:none; }
        .loading {
            position: fixed; top:50%; left:50%; transform:translate(-50%,-50%);
            font-family: system-ui, sans-serif; color:#64748b; text-align:center; z-index:100;
        }
    </style>
</head>
<body>

    <div class="loading" id="loadingText">
        <p id="loadingMessage">Memuat silsilah keluarga...</p>
    </div>

    <iframe id="gasFrame" src=""></iframe>

    <script>
        // GANTI DENGAN LINK DEPLOY ANDA (akhiran /exec)
        const gasLink = "https://script.google.com/macros/s/AKfycbzfz6u-fzJaCGmcbUi1xksFMKCmXWkVXqAwBenu7tQ8TOe8SHsY2ITmbXSw9OtIrYUOTA/exec";

        const urlParams = new URLSearchParams(window.location.search);
        const uid = urlParams.get('uid');
        const mode = urlParams.get('mode');

        const iframe = document.getElementById('gasFrame');
        const loadingText = document.getElementById('loadingText');
        const loadingMessage = document.getElementById('loadingMessage');

        function loadApp() {
            let finalUrl = gasLink;

            if (uid) {
                const separator = gasLink.includes('?') ? '&' : '?';
                finalUrl += `${separator}uid=${encodeURIComponent(uid)}&mode=add`;
                
                loadingMessage.innerHTML = `
                    Scan QR berhasil ✓<br>
                    <span class="text-sm">Menyiapkan form tambah anggota keluarga...</span>
                `;
                console.log("QR Scan → UID:", uid, "Mode: add");
            }

            iframe.src = finalUrl;

            // Sembunyikan loading setelah iframe load
            iframe.onload = () => {
                setTimeout(() => {
                    loadingText.style.transition = "opacity 0.6s";
                    loadingText.style.opacity = "0";
                    setTimeout(() => loadingText.style.display = "none", 800);
                }, 1000);
            };
        }

        window.onload = loadApp;
    </script>
</body>
</html>
