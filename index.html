<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Silsilah Keluarga</title>
    <style>
        body, html { margin:0; padding:0; height:100%; overflow:hidden; background:#f8fafc; }
        iframe { width:100%; height:100%; border:none; }
        .loading {
            position: fixed; top:50%; left:50%; transform:translate(-50%,-50%);
            font-family: system-ui, sans-serif; color:#64748b; text-align:center; z-index:100;
        }
    </style>
</head>
<body>

    <div class="loading" id="loadingText">
        <p id="loadingMessage">Memuat silsilah keluarga...</p>
    </div>

    <iframe id="gasFrame" src=""></iframe>

    <script>
        const gasLink = "https://script.google.com/macros/s/AKfycbzfz6u-fzJaCGmcbUi1xksFMKCmXWkVXqAwBenu7tQ8TOe8SHsY2ITmbXSw9OtIrYUOTA/exec";

        const urlParams = new URLSearchParams(window.location.search);
        const uid = urlParams.get('uid');
        const mode = urlParams.get('mode');

        const iframe = document.getElementById('gasFrame');
        const loadingMessage = document.getElementById('loadingMessage');

        function loadApp() {
            let finalUrl = gasLink;

            if (uid) {
                const separator = gasLink.includes('?') ? '&' : '?';
                finalUrl += `${separator}uid=${encodeURIComponent(uid)}`;
                if (mode === 'add') finalUrl += `&mode=add`;

                loadingMessage.innerHTML = `
                    Scan QR berhasil ✓<br>
                    <small class="text-sm">Menyiapkan form tambah anggota keluarga...</small>
                `;
                console.log("Parent: Mengirim UID & Mode ke iframe →", uid, mode);
            }

            iframe.src = finalUrl;

            // Kirim parameter via postMessage setelah iframe mulai load
            iframe.onload = function() {
                setTimeout(() => {
                    if (uid) {
                        iframe.contentWindow.postMessage({
                            type: "QR_SCAN_DATA",
                            uid: uid,
                            mode: mode || "add"
                        }, "*");
                        console.log("postMessage dikirim ke iframe");
                    }
                    loadingMessage.parentElement.style.opacity = "0";
                }, 800);
            };
        }

        window.onload = loadApp;
    </script>
</body>
</html>
