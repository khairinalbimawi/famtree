<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Silsilah Keluarga</title>
    <style>
        body, html { margin:0; padding:0; height:100%; overflow:hidden; background:#f8fafc; }
        iframe { width:100%; height:100%; border:none; }
        .loading {
            position: fixed; top:50%; left:50%; transform:translate(-50%,-50%);
            font-family: system-ui, sans-serif; color:#64748b; text-align:center; z-index:100;
        }
    </style>
</head>
<body>

    <div class="loading" id="loadingText">
        <p id="loadingMessage">Memuat silsilah keluarga...</p>
    </div>

    <iframe id="gasFrame" src=""></iframe>

    <script>
        const gasLink = "https://script.google.com/macros/s/AKfycbxet0_AIg0x2nExNhxyuf_4MwnbZRbZxr3cIxSbytPpKT8N0FhZuF24at2uYCk3DdGARQ/exec";
        const urlParams = new URLSearchParams(window.location.search);
        const uid = urlParams.get('uid');

        const iframe = document.getElementById('gasFrame');
        const loadingMessage = document.getElementById('loadingMessage');

        function loadApp() {
            let finalUrl = gasLink;
            if (uid) {
                const separator = gasLink.includes('?') ? '&' : '?';
                finalUrl += `${separator}uid=${encodeURIComponent(uid)}`;
                loadingMessage.innerHTML = `Scan QR berhasil ✓<br><small>Membuka profil...</small>`;
            }
            iframe.src = finalUrl;
        }

        window.onload = loadApp;
    </script>
</body>
</html>
