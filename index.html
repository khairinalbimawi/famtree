<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Silsilah Keluarga APP</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #f3f4f6; }
        iframe { width: 100%; height: 100vh; border: none; display: block; }
    </style>
</head>
<body>
    
    <iframe id="appFrame" src=""></iframe>

    <script>
        // 🔥 1. GANTI INI DENGAN URL GOOGLE APPS SCRIPT (WEB APP) ANDA 🔥
        // Contoh: "https://script.google.com/macros/s/AKfycby.../exec"
        var gasUrl = "https://script.google.com/macros/s/AKfycbzfz6u-fzJaCGmcbUi1xksFMKCmXWkVXqAwBenu7tQ8TOe8SHsY2ITmbXSw9OtIrYUOTA/exec";

        // 🔥 2. Menangkap parameter ?uid= dari URL GitHub Pages
        var urlParams = new URLSearchParams(window.location.search);
        var uid = urlParams.get('uid');

        // 🔥 3. Mengoper parameter ke dalam iframe Google Apps Script
        if (uid) {
            gasUrl += "?uid=" + uid;
        }

        // 🔥 4. Jalankan aplikasi dengan URL yang sudah disuntik ID
        document.getElementById('appFrame').src = gasUrl;
    </script>
</body>
</html>
